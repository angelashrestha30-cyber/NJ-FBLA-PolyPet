<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PolyPet - Schedule</title>
<link rel="stylesheet" href="css/styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <div class="logo">🐾 PolyPet</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="schedule.html">Schedule</a>
    <a href="resources.html">Resources</a>
    <a href="pets.html">Pets</a>
  </div>
</nav>

<section id="schedule" class="section">
  <h2>Today's Schedule</h2>
  <div class="filter-buttons">
    <button onclick="filterSchedule('all')">All</button>
    <button onclick="filterSchedule('spanish')">Spanish</button>
    <button onclick="filterSchedule('mandarin')">Mandarin</button>
  </div>
  <div class="schedule-grid">
    <div class="event spanish">
      <h3>Spanish Lesson</h3>
      <p>2:00 PM – 3:00 PM EST</p>
    </div>
    <div class="event mandarin">
      <h3>Mandarin Lesson</h3>
      <p>6:00 PM – 7:00 PM EST</p>
    </div>
  </div>

  <div class="calendar-box">
    <input type="date" id="lesson-date">
    <button onclick="scheduleLesson()">Schedule Lesson</button>
    <ul id="lesson-list"></ul>
  </div>

  <div class="world-clock">
    <h3 class="world-clock-title">🌍 World Clock</h3>
    <div id="clock-container" class="clock-container"></div>
    <div class="add-clock-box">
      <input type="text" id="new-country" placeholder="Country Name">
      <input type="text" id="new-tz" placeholder="Timezone (e.g. Europe/Berlin)">
      <button id="add-clock-btn" type="button">Add Clock</button>
    </div>
  </div>
</section>

<footer>© 2026 PolyPet | NJ FBLA State Competition</footer>
<script src="js/script.js"></script>
</body>
</html>
