<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyPet</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- BLOBS -->
  <div class="blob" style="top:10%; left:5%; width:300px; height:300px;"></div>
  <div class="blob" style="bottom:10%; right:10%; width:250px; height:250px;"></div>
  <div class="blob" style="top:50%; left:60%; width:200px; height:200px;"></div>

  <!-- NAVBAR -->
  <nav>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('pets')">Pets</button>
    <button onclick="showSection('schedule')">Schedule</button>
    <button onclick="showSection('resources')">Resources</button>
  </nav>

  <!-- HOME / GREETING -->
  <section id="home" class="section glass">
    <div id="greeting-container">Good Morning, Emma! 🌞</div>
    <div class="pet-dashboard glass">
      <div class="pet-avatar">🦊</div>
      <div class="pet-info">
        <div>Level: <span id="level">1</span></div>
        <div>XP: <div id="xp-bar"><div id="xp-fill"></div></div></div>
        <div>🔥 Streak: <span id="streak">0</span></div>
      </div>
      <button onclick="completeLesson()">Play Lesson</button>
    </div>
  </section>

  <!-- PETS -->
  <section id="pets" class="section glass">
    <h2>Pet Collection</h2>
    <div id="pet-collection"></div>
    <h3>Collect Demo Pets</h3>
    <button onclick="collectPet('Spanish')">Spanish 🦊</button>
    <button onclick="collectPet('Mandarin')">Mandarin 🐼</button>
    <button onclick="collectPet('Japanese')">Japanese 🐱</button>
  </section>

  <!-- SCHEDULE -->
  <section id="schedule" class="section glass">
    <h2>World Clock 🌍</h2>
    <div id="clock-container"></div>
  </section>

  <!-- RESOURCES -->
  <section id="resources" class="section glass">
    <h2>Learning Tools</h2>

    <!-- FLASHCARDS -->
    <div id="flashcards-section" class="glass">
      <h3>Flashcards</h3>
      <div id="flashcard">Click to start</div>
      <button onclick="flipCard()">Flip</button>
      <button onclick="nextCard()">Next</button>
    </div>

    <!-- PRACTICE -->
    <div id="practice-section" class="glass">
      <h3>Practice</h3>
      <div class="practice-box">
        <p id="practiceQuestion">Click Start to begin</p>
        <input id="practiceInput" type="text" placeholder="Answer here">
        <button onclick="checkPractice()">Check</button>
        <p id="practiceResult"></p>
        <button id="nextPracticeBtn" onclick="nextPractice()" style="display:none;">Next</button>
        <button onclick="startPractice()">Start Practice</button>
      </div>
    </div>

    <!-- UNIT TEST -->
    <div id="unitTest-section" class="glass">
      <h3>Unit Test</h3>
      <div id="unitTest"></div>
    </div>

  </section>

  <!-- CONFETTI -->
  <canvas id="confettiCanvas"></canvas>

  <!-- SCRIPT -->
  <script src="script.js"></script>
</body>
</html>
