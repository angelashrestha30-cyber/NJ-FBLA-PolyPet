<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolyPet</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🐾 PolyPet</div>
    <div class="nav-links">
      <button data-page="home">Home</button>
      <button data-page="pets">Pets</button>
      <button data-page="resources">Resources</button>
      <button data-page="practice">Practice</button>
      <button data-page="test">Unit Test</button>
    </div>
  </nav>

  <!-- BLOB EFFECT -->
  <div class="blob" style="width:300px;height:300px;top:10%;left:5%;background:radial-gradient(circle,#ffb3c6,#ff7f9e);"></div>
  <div class="blob" style="width:250px;height:250px;bottom:10%;right:10%;background:radial-gradient(circle,#ff8fb1,#ff5fae);animation-delay:3s;"></div>
  <div class="blob" style="width:200px;height:200px;top:50%;left:60%;background:radial-gradient(circle,#ffc2d1,#ff95b3);animation-delay:6s;"></div>

  <!-- PAGE CONTAINER -->
  <main id="page-container">
    <!-- Home Page -->
    <section id="home" class="page glass-card active">
      <header id="greeting">Good Morning, Emma!</header>
      <div id="clock-container"></div>
      <div class="pet-panel glass-card">
        <div class="pet-avatar">🦊</div>
        <div id="pet-name-display">Pika</div>
        <input id="pet-name-input" placeholder="Rename your pet">
        <button id="pet-name-btn">Rename</button>
        <p>Level: <span id="level">1</span> | Streak: <span id="streak">0</span></p>
        <div id="xp-bar"><div id="xp-fill"></div></div>
        <button onclick="completeLesson()">Play</button>
      </div>
    </section>

    <!-- Pets Page -->
    <section id="pets" class="page glass-card">
      <h2>Pet Collection</h2>
      <div id="pet-collection"></div>
      <button onclick="collectPet('Spanish')">Spanish 🦊</button>
      <button onclick="collectPet('Mandarin')">Mandarin 🐼</button>
      <button onclick="collectPet('Japanese')">Japanese 🐱</button>
    </section>

    <!-- Resources Page -->
    <section id="resources" class="page glass-card">
      <h2>Resources</h2>
      <div class="resource-buttons">
        <button onclick="showResource('video')">🎥 Video</button>
        <button onclick="showResource('flashcards')">🃏 Flashcards</button>
      </div>
      <div id="video" class="resource-content active">
        <h3>Video Lesson</h3>
        <p>Embed your video here!</p>
      </div>
      <div id="flashcards" class="resource-content">
        <div id="flashcard">Click to Flip</div>
        <button onclick="nextCard()">Next</button>
      </div>
    </section>

    <!-- Practice Page -->
    <section id="practice" class="page glass-card">
      <h2>Practice Mode</h2>
      <div id="practice-container">
        <p id="practiceQuestion"></p>
        <input id="practiceInput" placeholder="Type answer">
        <button onclick="checkPractice()">Check</button>
        <p id="practiceResult"></p>
        <button id="nextPracticeBtn" onclick="nextPractice()" style="display:none;">Next</button>
      </div>
      <button onclick="startPractice()">Start Practice</button>
    </section>

    <!-- Test Page -->
    <section id="test" class="page glass-card">
      <h2>Unit Test</h2>
      <div id="unitTest"></div>
    </section>
  </main>

  <!-- CONFETTI CANVAS -->
  <canvas id="confettiCanvas"></canvas>

  <script src="js/script.js"></script>
</body>
</html>
